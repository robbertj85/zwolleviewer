services:
  control-plane:
    image: tractusx/edc-controlplane-memory-hashicorp-vault:0.5.4
    depends_on:
      - vault
    environment:
      EDC_PARTICIPANT_ID: ${EDC_PARTICIPANT_ID:-zwolle-data-viewer}
      EDC_API_AUTH_KEY: ${EDC_API_AUTH_KEY:-password}
      EDC_DSP_CALLBACK_ADDRESS: http://control-plane:8282/protocol
      # Management API
      WEB_HTTP_PORT: 8080
      WEB_HTTP_PATH: /api
      WEB_HTTP_MANAGEMENT_PORT: 8181
      WEB_HTTP_MANAGEMENT_PATH: /management
      WEB_HTTP_PROTOCOL_PORT: 8282
      WEB_HTTP_PROTOCOL_PATH: /protocol
      WEB_HTTP_CONTROL_PORT: 8283
      WEB_HTTP_CONTROL_PATH: /control
      # Vault
      EDC_VAULT_HASHICORP_URL: http://vault:8200
      EDC_VAULT_HASHICORP_TOKEN: ${VAULT_TOKEN:-root}
      # Encryption
      EDC_DATA_ENCRYPTION_KEYS_ALIAS: data-encryption-key
      EDC_DATA_ENCRYPTION_ALGORITHM: AES
      # SSI / MIW (stub values for local development)
      TX_SSI_OAUTH_TOKEN_URL: http://vault:8200/v1/identity/oidc/token
      TX_SSI_OAUTH_CLIENT_ID: zwolle-data-viewer
      TX_SSI_OAUTH_CLIENT_SECRET_ALIAS: client-secret
      TX_SSI_MIW_URL: http://localhost:8080
      TX_SSI_MIW_AUTHORITY_ID: BPNL000000000001
      TX_SSI_ENDPOINT_AUDIENCE: http://localhost:8282/protocol
      # Data plane selector
      EDC_DATAPLANE_SELECTOR_DEFAULTPLANE_URL: http://data-plane:8185/control/transfer
      EDC_DATAPLANE_SELECTOR_DEFAULTPLANE_SOURCETYPES: HttpData
      EDC_DATAPLANE_SELECTOR_DEFAULTPLANE_DESTINATIONTYPES: HttpProxy,HttpData
      EDC_DATAPLANE_SELECTOR_DEFAULTPLANE_PROPERTIES: '{"publicApiUrl":"http://localhost:8185/public"}'
    ports:
      - "8181:8181"   # Management API
      - "8282:8282"   # DSP Protocol
      - "8283:8283"   # Control API

  data-plane:
    image: tractusx/edc-dataplane-hashicorp-vault:0.5.4
    depends_on:
      - control-plane
    environment:
      EDC_API_AUTH_KEY: ${EDC_API_AUTH_KEY:-password}
      WEB_HTTP_PORT: 8080
      WEB_HTTP_PATH: /api
      WEB_HTTP_PUBLIC_PORT: 8185
      WEB_HTTP_PUBLIC_PATH: /public
      WEB_HTTP_CONTROL_PORT: 8185
      WEB_HTTP_CONTROL_PATH: /control
      EDC_DATAPLANE_TOKEN_VALIDATION_ENDPOINT: http://control-plane:8283/control/token
      # Vault
      EDC_VAULT_HASHICORP_URL: http://vault:8200
      EDC_VAULT_HASHICORP_TOKEN: ${VAULT_TOKEN:-root}
    ports:
      - "8185:8185"   # Public API

  vault:
    image: hashicorp/vault:1.15
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
